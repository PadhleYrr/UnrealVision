<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lyric Aura</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: rgba(220, 210, 255, 0.82);
    --ink-dim: rgba(180, 160, 240, 0.45);
    --ink-faint: rgba(160, 140, 220, 0.22);
    --accent: rgba(200, 180, 255, 0.9);
    --bg: #07040f;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Jost', sans-serif;
    color: var(--ink);
    -webkit-tap-highlight-color: transparent;
  }

  #stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  #overlay-canvas {
    position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
  }

  #ui {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    padding-bottom: max(env(safe-area-inset-bottom, 16px), 24px);
    padding-left: 20px; padding-right: 20px;
  }

  #song-info {
    text-align: center;
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #song-info.visible { opacity: 1; transform: translateY(0); }
  #song-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 300; letter-spacing: 0.04em;
    color: var(--accent);
  }
  #song-artist {
    font-size: 11px; font-weight: 200; letter-spacing: 0.18em;
    color: var(--ink-dim); margin-top: 3px; text-transform: uppercase;
  }

  #controls {
    display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%;
  }

  #search-row {
    display: flex; gap: 8px; width: 100%; max-width: 360px;
  }

  #search-input {
    flex: 1; background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 100px; padding: 10px 18px;
    font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 200;
    color: var(--ink); outline: none; letter-spacing: 0.04em;
    -webkit-appearance: none;
  }
  #search-input::placeholder { color: var(--ink-faint); }
  #search-input:focus { border-color: rgba(200,180,255,0.3); }

  .btn {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 100px; padding: 10px 20px;
    font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 300;
    color: var(--ink); cursor: pointer; letter-spacing: 0.08em;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap; -webkit-appearance: none;
  }
  .btn:active { background: rgba(255,255,255,0.08); }

  #mic-btn {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--surface); border: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.3s ease; flex-shrink: 0;
  }
  #mic-btn.listening {
    border-color: rgba(200,180,255,0.6);
    background: rgba(200,180,255,0.1);
    animation: pulse-ring 1.4s ease infinite;
  }
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(200,180,255,0.3); }
    70% { box-shadow: 0 0 0 14px rgba(200,180,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(200,180,255,0); }
  }

  #status {
    font-size: 11px; font-weight: 200; letter-spacing: 0.14em;
    color: var(--ink-dim); min-height: 16px; text-align: center;
  }

  #fullscreen-btn {
    position: fixed; top: max(env(safe-area-inset-top, 10px), 14px); right: 18px;
    z-index: 20; background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 100px; padding: 7px 14px;
    font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 200;
    color: var(--ink-dim); cursor: pointer; letter-spacing: 0.1em;
  }

  #app-name {
    position: fixed; top: max(env(safe-area-inset-top, 10px), 14px); left: 18px;
    z-index: 20; font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 300; font-style: italic;
    color: var(--ink-dim); letter-spacing: 0.06em; pointer-events: none;
  }

  .lyric-line {
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-style: italic;
    color: rgba(220, 210, 255, 0);
    pointer-events: none;
    white-space: nowrap;
    text-align: center;
    transform-origin: center;
    animation: floatUp linear forwards;
    text-shadow: 0 0 30px rgba(200,180,255,0.0);
  }
  @keyframes floatUp {
    0%   { opacity: 0; color: rgba(220,210,255,0); transform: translateY(0) scale(1); }
    8%   { opacity: 1; color: rgba(220,210,255,0.75); text-shadow: 0 0 40px rgba(200,180,255,0.35); }
    60%  { opacity: 1; color: rgba(220,210,255,0.6); }
    100% { opacity: 0; color: rgba(220,210,255,0); transform: translateY(-280px) scale(0.94); }
  }

  #aurd-note {
    font-size: 10px; color: var(--ink-faint); text-align: center;
    letter-spacing: 0.06em; margin-top: 4px;
  }
  #aurd-note a { color: rgba(200,180,255,0.45); text-decoration: none; }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div id="overlay-canvas"></div>

<div id="app-name">lyric aura</div>
<button id="fullscreen-btn" onclick="toggleFullscreen()">fullscreen</button>

<div id="ui">
  <div id="song-info">
    <div id="song-title"></div>
    <div id="song-artist"></div>
  </div>
  <div id="controls">
    <div id="search-row">
      <input id="search-input" type="text" placeholder="song name or artist..." autocomplete="off" spellcheck="false">
      <button class="btn" onclick="manualSearch()">show lyrics</button>
      <div id="mic-btn" onclick="toggleMic()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(200,180,255,0.7)" stroke-width="1.5" stroke-linecap="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9" y1="22" x2="15" y2="22"/>
        </svg>
      </div>
    </div>
    <div id="status">tap the mic to detect · or search a song</div>
    <div id="aurd-note">song detection uses <a href="https://audd.io" target="_blank">audd.io</a> free tier · lyrics via lyrics.ovh</div>
  </div>
</div>

<script>
const AUDD_TOKEN = 'test';

const overlayCanvas = document.getElementById('overlay-canvas');
const statusEl = document.getElementById('status');
const songInfo = document.getElementById('song-info');
const songTitleEl = document.getElementById('song-title');
const songArtistEl = document.getElementById('song-artist');
const micBtn = document.getElementById('mic-btn');

let lyrics = [];
let lyricIndex = 0;
let lyricInterval = null;
let listening = false;
let mediaRecorder = null;
let audioChunks = [];

function setStatus(msg) { statusEl.textContent = msg; }

function showSong(title, artist) {
  songTitleEl.textContent = title;
  songArtistEl.textContent = artist;
  songInfo.classList.add('visible');
}

async function fetchLyrics(artist, title) {
  try {
    const r = await fetch(`https://api.lyrics.ovh/v1/${encodeURIComponent(artist)}/${encodeURIComponent(title)}`);
    const d = await r.json();
    if (d.lyrics) {
      return d.lyrics.split('\n').map(l => l.trim()).filter(l => l.length > 1);
    }
  } catch(e) {}
  return null;
}

function startLyricOverlay(lines) {
  if (lyricInterval) clearInterval(lyricInterval);
  lyrics = lines;
  lyricIndex = 0;
  overlayCanvas.innerHTML = '';

  lyricInterval = setInterval(() => {
    if (lyricIndex >= lyrics.length) { lyricIndex = 0; }
    spawnLyricLine(lyrics[lyricIndex]);
    lyricIndex++;
  }, 2800);
  spawnLyricLine(lyrics[0]);
  lyricIndex = 1;
}

function spawnLyricLine(text) {
  if (!text) return;
  const el = document.createElement('div');
  el.className = 'lyric-line';
  el.textContent = text;

  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const sizes = [15, 16, 17, 18, 20, 22, 14];
  const sz = sizes[Math.floor(Math.random() * sizes.length)];
  el.style.fontSize = sz + 'px';

  const margin = 60;
  const x = margin + Math.random() * (vw - margin * 2);
  const startY = vh * 0.55 + Math.random() * (vh * 0.25);

  el.style.left = x + 'px';
  el.style.top = startY + 'px';
  el.style.transform = 'translateX(-50%)';

  const opacity = 0.4 + Math.random() * 0.45;
  const duration = 9 + Math.random() * 6;
  el.style.animationDuration = duration + 's';
  el.style.opacity = opacity;

  overlayCanvas.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, duration * 1000 + 200);
}

async function manualSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  setStatus('searching...');
  overlayCanvas.innerHTML = '';
  if (lyricInterval) clearInterval(lyricInterval);

  const parts = q.split(/\s+by\s+/i);
  let artist = '', title = q;
  if (parts.length === 2) { title = parts[0].trim(); artist = parts[1].trim(); }

  let lines = null;
  if (artist) {
    lines = await fetchLyrics(artist, title);
  }
  if (!lines) {
    lines = await searchLyricsByQuery(q);
  }

  if (lines && lines.length > 2) {
    showSong(title, artist || 'unknown artist');
    setStatus('drifting through the words...');
    startLyricOverlay(lines);
  } else {
    setStatus('lyrics not found · try "song title by artist"');
  }
}

async function searchLyricsByQuery(q) {
  const words = q.split(' ');
  const tryTitle = words.slice(0, Math.ceil(words.length / 2)).join(' ');
  const tryArtist = words.slice(Math.ceil(words.length / 2)).join(' ');
  let lines = await fetchLyrics(tryArtist, tryTitle);
  if (!lines) lines = await fetchLyrics(q, tryTitle);
  return lines;
}

async function toggleMic() {
  if (listening) { stopListening(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    startListening(stream);
  } catch(e) {
    setStatus('microphone permission denied');
  }
}

function startListening(stream) {
  listening = true;
  micBtn.classList.add('listening');
  setStatus('listening... hold near the speaker');
  audioChunks = [];

  const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
  mediaRecorder = new MediaRecorder(stream, { mimeType });
  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
  mediaRecorder.onstop = () => { identifySong(mimeType); stream.getTracks().forEach(t => t.stop()); };
  mediaRecorder.start();

  setTimeout(() => { if (listening) stopListening(); }, 10000);
}

function stopListening() {
  listening = false;
  micBtn.classList.remove('listening');
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    setStatus('identifying song...');
  }
}

async function identifySong(mimeType) {
  try {
    const blob = new Blob(audioChunks, { type: mimeType });
    const form = new FormData();
    form.append('file', blob, 'audio.webm');
    form.append('return', 'apple_music,spotify');
    form.append('api_token', AUDD_TOKEN);

    const res = await fetch('https://api.audd.io/', { method: 'POST', body: form });
    const data = await res.json();

    if (data.result) {
      const { title, artist } = data.result;
      setStatus('found it · fetching lyrics...');
      showSong(title, artist);
      document.getElementById('search-input').value = title + ' by ' + artist;

      const lines = await fetchLyrics(artist, title);
      if (lines && lines.length > 2) {
        setStatus('drifting through the words...');
        startLyricOverlay(lines);
      } else {
        setStatus('song found but lyrics unavailable');
      }
    } else {
      setStatus('song not recognized · try searching manually');
    }
  } catch(e) {
    setStatus('detection failed · check connection');
  }
}

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') manualSearch();
});

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

(function drawStars() {
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; drawStar(); }
  function drawStar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < 120; i++) {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height;
      const r = Math.random() * 1.2;
      const a = Math.random() * 0.5 + 0.05;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220,210,255,${a})`;
      ctx.fill();
    }
  }
  window.addEventListener('resize', resize);
  resize();
})();
</script>
</body>
</html>
